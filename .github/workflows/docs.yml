name: Deploy Docs & Playground

on:
  push:
    branches: [main]
    paths: ['docs/**', 'web/**', 'src/**', 'Cargo.toml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install tools
        run: |
          cargo install mdbook --version 0.4.52
          cargo install wasm-pack

      - name: Build WASM
        run: wasm-pack build --target web --out-dir pkg -- --no-default-features

      - name: Copy WASM to playground
        run: |
          cp pkg/han_bg.wasm web/han_bg.wasm
          cp pkg/han.js web/han.js

      - name: Build docs
        run: cd docs && mdbook build

      - name: Copy playground
        run: cp -r web docs/book/playground

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
