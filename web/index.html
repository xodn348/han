<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Han (한) Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }

    header span {
      font-size: 13px;
      color: #8b949e;
    }

    .badge {
      font-size: 11px;
      background: #1f6feb;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #21262d;
    }

    .panel-header {
      padding: 8px 16px;
      font-size: 12px;
      color: #8b949e;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #editor {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      min-height: 480px;
    }

    #output {
      flex: 1;
      background: #010409;
      color: #56d364;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 480px;
      overflow-y: auto;
    }

    #output.error { color: #f85149; }
    #output.waiting { color: #8b949e; font-style: italic; }

    .run-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .run-btn:hover { background: #2ea043; }
    .run-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

    .examples {
      padding: 8px 16px;
      background: #161b22;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .example-btn {
      font-size: 12px;
      color: #8b949e;
      background: transparent;
      border: 1px solid #30363d;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .example-btn:hover { color: #c9d1d9; border-color: #6e7681; }
  </style>
</head>
<body>

<header>
  <h1>한 <span style="color:#8b949e">Han</span></h1>
  <span class="badge">v0.1.0</span>
  <span>한국어 프로그래밍 언어 플레이그라운드</span>
  <span style="margin-left:auto; font-size:12px; color:#8b949e">
    <a href="https://github.com/xodn348/han" style="color:#58a6ff">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://xodn348.github.io/han/introduction.html" style="color:#58a6ff">Docs</a>
  </span>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span>코드 편집기</span>
      <button class="run-btn" id="runBtn" onclick="runCode()">▶ 실행</button>
    </div>
    <textarea id="editor" spellcheck="false">출력("🎵 Golden — KPOP Demon Hunters")
출력("영원히 깨질 수 없는")</textarea>
    <div class="examples">
      <button class="example-btn" onclick="loadExample('golden')">🎵 Golden</button>
      <button class="example-btn" onclick="loadExample('store')">편의점</button>
      <button class="example-btn" onclick="loadExample('grades')">성적표</button>
      <button class="example-btn" onclick="loadExample('fizzbuzz')">피즈버즈</button>
      <button class="example-btn" onclick="loadExample('euclid')">유클리드</button>
    </div>
  </div>

  <div class="panel" style="border-right:none">
    <div class="panel-header">
      <span>출력</span>
    </div>
    <div id="output" class="waiting">▶ 실행 버튼을 눌러주세요</div>
  </div>
</div>

<script type="module">
  import init, { run_han } from './han.js';

  const EXAMPLES = {
    golden: `변수 제목 = "Golden"
변수 아티스트 = "KPOP Demon Hunters"

변수 후렴 = [
    "We're goin' up, up, up, it's our moment",
    "You know together we're glowing",
    "Gonna be, gonna be golden",
    "영원히 깨질 수 없는",
    "Gonna be, gonna be golden"
]

출력("🎵 " + 제목 + " — " + 아티스트)
출력("")
반복 변수 i = 0; i < 후렴.길이(); i += 1 {
    출력(후렴[i])
}`,

    store: `변수 상품 = ["삼각김밥", "컵라면", "에너지드링크", "삼립호빵"]
변수 가격 = [1200, 1300, 2500, 1500]

출력("=== GS25 영수증 ===")
변수 합계 = 0
반복 변수 i = 0; i < 상품.길이(); i += 1 {
    출력(형식("{0}  {1}원", 상품[i], 가격[i]))
    합계 = 합계 + 가격[i]
}
출력("------------------")
출력(형식("합계  {0}원", 합계))
출력(형식("카드  -{0}원", 0))
출력(형식("결제  {0}원", 합계))`,

    grades: `구조 학생 {
    이름: 문자열,
    국어: 정수,
    수학: 정수,
    영어: 정수
}

변수 반 = [
    학생 { 이름: "김민준", 국어: 85, 수학: 92, 영어: 78 },
    학생 { 이름: "이서연", 국어: 90, 수학: 88, 영어: 95 },
    학생 { 이름: "박지호", 국어: 72, 수학: 96, 영어: 83 }
]

출력("이름    국어  수학  영어  평균")
출력("----------------------------")
반복 변수 i = 0; i < 반.길이(); i += 1 {
    변수 평균 = (반[i].국어 + 반[i].수학 + 반[i].영어) / 3
    출력(형식("{0}  {1}   {2}   {3}   {4}",
        반[i].이름, 반[i].국어, 반[i].수학, 반[i].영어, 평균))
}`,

    fizzbuzz: `출력("=== 피즈버즈 (1~30) ===")
반복 변수 i = 1; i <= 30; i += 1 {
    만약 i % 15 == 0 {
        출력("피즈버즈")
    } 아니면 만약 i % 3 == 0 {
        출력("피즈")
    } 아니면 만약 i % 5 == 0 {
        출력("버즈")
    } 아니면 {
        출력(i)
    }
}`,

    euclid: `함수 최대공약수(가: 정수, 나: 정수) -> 정수 {
    만약 나 == 0 {
        반환 가
    }
    반환 최대공약수(나, 가 % 나)
}

출력("=== 유클리드 호제법 ===")
출력("기원전 300년 알고리즘 — 지금도 암호화에 쓰임")
출력("")
출력(형식("GCD(48, 18)      = {0}", 최대공약수(48, 18)))
출력(형식("GCD(1071, 462)   = {0}", 최대공약수(1071, 462)))
출력(형식("GCD(100, 75)     = {0}", 최대공약수(100, 75)))
출력("")

변수 가 = 48
변수 나 = 18
출력(형식("GCD({0}, {1}) 계산 과정:", 가, 나))
동안 나 != 0 {
    변수 나머지 = 가 % 나
    출력(형식("  {0} % {1} = {2}", 가, 나, 나머지))
    가 = 나
    나 = 나머지
}
출력(형식("  → 최대공약수: {0}", 가))`
  };

  let wasmReady = false;

  async function initWasm() {
    await init();
    wasmReady = true;
    document.getElementById('runBtn').disabled = false;
  }

  window.runCode = function() {
    if (!wasmReady) return;
    const code = document.getElementById('editor').value;
    const out = document.getElementById('output');
    out.className = '';
    const result = run_han(code);
    if (result.includes('[런타임 에러]') || result.includes('[파서 에러]') || result.includes('[타입 에러]')) {
      out.className = 'error';
    }
    out.textContent = result || '(출력 없음)';
  };

  window.loadExample = function(name) {
    document.getElementById('editor').value = EXAMPLES[name];
  };

  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      window.runCode();
    }
  });

  document.getElementById('runBtn').disabled = true;
  initWasm();
</script>

</body>
</html>
