<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Han (한) Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }

    header span {
      font-size: 13px;
      color: #8b949e;
    }

    .badge {
      font-size: 11px;
      background: #1f6feb;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #21262d;
    }

    .panel-header {
      padding: 8px 16px;
      font-size: 12px;
      color: #8b949e;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #editor {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      min-height: 480px;
    }

    #output {
      flex: 1;
      background: #010409;
      color: #56d364;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 480px;
      overflow-y: auto;
    }

    #output.error { color: #f85149; }
    #output.waiting { color: #8b949e; font-style: italic; }

    .run-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .run-btn:hover { background: #2ea043; }
    .run-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

    .examples {
      padding: 8px 16px;
      background: #161b22;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .example-btn {
      font-size: 12px;
      color: #8b949e;
      background: transparent;
      border: 1px solid #30363d;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .example-btn:hover { color: #c9d1d9; border-color: #6e7681; }
  </style>
</head>
<body>

<header>
  <h1>한 <span style="color:#8b949e">Han</span></h1>
  <span class="badge">v0.1.0</span>
  <span>한국어 프로그래밍 언어 플레이그라운드</span>
  <span style="margin-left:auto; font-size:12px; color:#8b949e">
    <a href="https://github.com/xodn348/han" style="color:#58a6ff">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://xodn348.github.io/han/introduction.html" style="color:#58a6ff">Docs</a>
  </span>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span>코드 편집기</span>
      <button class="run-btn" id="runBtn" onclick="runCode()">▶ 실행</button>
    </div>
    <textarea id="editor" spellcheck="false">출력("🎵 Golden — KPOP Demon Hunters")
출력("밝게 빛나는 우린")</textarea>
    <div class="examples">
      <button class="example-btn" onclick="loadExample('hello')">변수</button>
      <button class="example-btn" onclick="loadExample('array')">배열</button>
      <button class="example-btn" onclick="loadExample('struct')">구조체</button>
      <button class="example-btn" onclick="loadExample('func')">함수</button>
      <button class="example-btn" onclick="loadExample('analyze')">문자열</button>
    </div>
  </div>

  <div class="panel" style="border-right:none">
    <div class="panel-header">
      <span>출력</span>
    </div>
    <div id="output" class="waiting">▶ 실행 버튼을 눌러주세요</div>
  </div>
</div>

<script type="module">
  import init, { run_han } from './han.js';

  const EXAMPLES = {
    hello: `// 변수 — Golden 가사로 배우기
변수 제목 = "Golden"
변수 아티스트 = "KPOP Demon Hunters"
변수 하이라이트 = "밝게 빛나는 우린"

출력(형식("🎵 {0} — {1}", 제목, 아티스트))
출력(형식("'{0}'", 하이라이트))
출력("→ We shine brightly")`,

    array: `// 배열 + 반복문 — 한국어 가사 줄 출력
변수 가사 = [
    "어두워진 앞길 속에",
    "끝없이 on stage",
    "영원히 깨질 수 없는",
    "밝게 빛나는 우린"
]

반복 변수 i = 0; i < 가사.길이(); i += 1 {
    출력(형식("{0}  {1}", i + 1, 가사[i]))
}`,

    struct: `// 구조체 — 가사 한/영 쌍
구조 가사줄 {
    한국어: 문자열,
    영어: 문자열
}

변수 lines = [
    가사줄 { 한국어: "어두워진 앞길 속에", 영어: "In the darkened path ahead" },
    가사줄 { 한국어: "끝없이", 영어: "Endlessly" },
    가사줄 { 한국어: "영원히 깨질 수 없는", 영어: "Can never be broken" },
    가사줄 { 한국어: "밝게 빛나는 우린", 영어: "We shine brightly" }
]

반복 변수 i = 0; i < lines.길이(); i += 1 {
    출력(lines[i].한국어)
    출력(형식("  → {0}", lines[i].영어))
}`,

    func: `// 함수 — 가사 포맷터
함수 가사출력(줄: 문자열, 번역: 문자열) {
    출력("♪ " + 줄)
    출력("  " + 번역)
    출력("")
}

출력("🎵 Golden — KPOP Demon Hunters")
출력("")
가사출력("어두워진 앞길 속에", "In the darkened path ahead")
가사출력("영원히 깨질 수 없는", "Can never be broken")
가사출력("밝게 빛나는 우린", "We shine brightly")
출력("Gonna be, gonna be golden")`,

    analyze: `// 문자열 메서드 — 가사 분석
변수 가사 = "어두워진 앞길 속에 끝없이 영원히 깨질 수 없는 밝게 빛나는 우린"

변수 단어들 = 가사.분리(" ")
출력(형식("전체: {0}", 가사))
출력(형식("단어 수: {0}개", 단어들.길이()))
출력(형식("글자 수: {0}자", 가사.길이()))
출력("")

반복 변수 i = 0; i < 단어들.길이(); i += 1 {
    출력(형식("  {0}. {1}", i + 1, 단어들[i]))
}`
  };

  let wasmReady = false;

  async function initWasm() {
    await init();
    wasmReady = true;
    document.getElementById('runBtn').disabled = false;
  }

  window.runCode = function() {
    if (!wasmReady) return;
    const code = document.getElementById('editor').value;
    const out = document.getElementById('output');
    out.className = '';
    const result = run_han(code);
    if (result.includes('[런타임 에러]') || result.includes('[파서 에러]') || result.includes('[타입 에러]')) {
      out.className = 'error';
    }
    out.textContent = result || '(출력 없음)';
  };

  window.loadExample = function(name) {
    document.getElementById('editor').value = EXAMPLES[name];
  };

  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      window.runCode();
    }
  });

  document.getElementById('runBtn').disabled = true;
  initWasm();
</script>

</body>
</html>
