<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Han (한) Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }

    header span {
      font-size: 13px;
      color: #8b949e;
    }

    .badge {
      font-size: 11px;
      background: #1f6feb;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #21262d;
    }

    .panel-header {
      padding: 8px 16px;
      font-size: 12px;
      color: #8b949e;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #editor {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      min-height: 480px;
    }

    #output {
      flex: 1;
      background: #010409;
      color: #56d364;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 480px;
      overflow-y: auto;
    }

    #output.error { color: #f85149; }
    #output.waiting { color: #8b949e; font-style: italic; }

    .run-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .run-btn:hover { background: #2ea043; }
    .run-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

    .examples {
      padding: 8px 16px;
      background: #161b22;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .example-btn {
      font-size: 12px;
      color: #8b949e;
      background: transparent;
      border: 1px solid #30363d;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .example-btn:hover { color: #c9d1d9; border-color: #6e7681; }
  </style>
</head>
<body>

<header>
  <h1>한 <span style="color:#8b949e">Han</span></h1>
  <span class="badge">v0.1.0</span>
  <span>한국어 프로그래밍 언어 플레이그라운드</span>
  <span style="margin-left:auto; font-size:12px; color:#8b949e">
    <a href="https://github.com/xodn348/han" style="color:#58a6ff">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://xodn348.github.io/han/introduction.html" style="color:#58a6ff">Docs</a>
  </span>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span>코드 편집기</span>
      <button class="run-btn" id="runBtn" onclick="runCode()">▶ 실행</button>
    </div>
    <textarea id="editor" spellcheck="false">출력("Golden — KPOP Demon Hunters")
출력("영원히 깨질 수 없는")</textarea>
    <div class="examples">
      <button class="example-btn" onclick="loadExample('golden')">Golden</button>
      <button class="example-btn" onclick="loadExample('fibonacci')">피보나치</button>
      <button class="example-btn" onclick="loadExample('euclid')">유클리드</button>
      <button class="example-btn" onclick="loadExample('bubble')">버블정렬</button>
      <button class="example-btn" onclick="loadExample('binary')">이진탐색</button>
      <button class="example-btn" onclick="loadExample('fizzbuzz')">피즈버즈</button>
    </div>
  </div>

  <div class="panel" style="border-right:none">
    <div class="panel-header">
      <span>출력</span>
    </div>
    <div id="output" class="waiting">▶ 실행 버튼을 눌러주세요</div>
  </div>
</div>

<script type="module">
  import init, { run_han } from './han.js';

  const EXAMPLES = {
    golden: `변수 후렴 = [
    "We're goin' up, up, up, it's our moment",
    "You know together we're glowing",
    "Gonna be, gonna be golden",
    "영원히 깨질 수 없는",
    "Gonna be, gonna be golden"
]

출력("Golden — KPOP Demon Hunters")
출력("")
반복 변수 i = 0; i < 후렴.길이(); i += 1 {
    출력(후렴[i])
}`,

    fibonacci: `함수 피보나치(n: 정수) -> 정수 {
    만약 n <= 1 {
        반환 n
    }
    반환 피보나치(n - 1) + 피보나치(n - 2)
}

출력("=== 피보나치 수열 ===")
반복 변수 i = 0; i < 10; i += 1 {
    출력(형식("피보나치({0}) = {1}", i, 피보나치(i)))
}

출력("")
출력("인접한 두 항의 비율 (황금비 수렴):")
반복 변수 i = 2; i < 10; i += 1 {
    변수 비율 = 실수변환(피보나치(i)) / 실수변환(피보나치(i - 1))
    출력(형식("  {0} / {1} = {2}", 피보나치(i), 피보나치(i - 1), 비율))
}`,

    euclid: `함수 최대공약수(가: 정수, 나: 정수) -> 정수 {
    만약 나 == 0 {
        반환 가
    }
    반환 최대공약수(나, 가 % 나)
}

함수 최소공배수(가: 정수, 나: 정수) -> 정수 {
    반환 가 / 최대공약수(가, 나) * 나
}

출력("=== 유클리드 호제법 ===")
출력("기원전 300년 — 지금도 RSA 암호화에 쓰임")
출력("")
출력(형식("GCD(48, 18)  = {0}", 최대공약수(48, 18)))
출력(형식("LCM(48, 18)  = {0}", 최소공배수(48, 18)))
출력("")
변수 가 = 1071
변수 나 = 462
출력(형식("GCD({0}, {1}) 계산 과정:", 가, 나))
동안 나 != 0 {
    변수 나머지 = 가 % 나
    출력(형식("  {0} % {1} = {2}", 가, 나, 나머지))
    가 = 나
    나 = 나머지
}
출력(형식("  결과: {0}", 가))`,

    bubble: `함수 버블정렬(수열: [정수]) {
    변수 n = 수열.길이()
    반복 변수 i = 0; i < n - 1; i += 1 {
        반복 변수 j = 0; j < n - i - 1; j += 1 {
            만약 수열[j] > 수열[j + 1] {
                변수 임시 = 수열[j]
                수열[j] = 수열[j + 1]
                수열[j + 1] = 임시
            }
        }
    }
}

변수 수열 = [64, 34, 25, 12, 22, 11, 90]
출력("정렬 전:")
출력(수열)

버블정렬(수열)

출력("정렬 후:")
출력(수열)`,

    binary: `함수 이진탐색(배열: [정수], 목표: 정수) -> 정수 {
    변수 왼쪽 = 0
    변수 오른쪽 = 배열.길이() - 1
    변수 단계 = 0

    동안 왼쪽 <= 오른쪽 {
        변수 중간 = (왼쪽 + 오른쪽) / 2
        단계 = 단계 + 1
        출력(형식("  {0}단계: 인덱스 {1} 확인 (값 {2})", 단계, 중간, 배열[중간]))

        만약 배열[중간] == 목표 {
            반환 중간
        } 아니면 만약 배열[중간] < 목표 {
            왼쪽 = 중간 + 1
        } 아니면 {
            오른쪽 = 중간 - 1
        }
    }
    반환 -1
}

변수 배열 = [2, 5, 8, 12, 16, 23, 38, 56, 72, 91]
출력("=== 이진 탐색 ===")
출력(형식("배열 크기: {0}개", 배열.길이()))
출력("목표값 23 탐색:")
변수 결과 = 이진탐색(배열, 23)
출력(형식("인덱스 {0}에서 발견", 결과))`,

    fizzbuzz: `출력("=== 피즈버즈 (1~30) ===")
반복 변수 i = 1; i <= 30; i += 1 {
    만약 i % 15 == 0 {
        출력("피즈버즈")
    } 아니면 만약 i % 3 == 0 {
        출력("피즈")
    } 아니면 만약 i % 5 == 0 {
        출력("버즈")
    } 아니면 {
        출력(i)
    }
}`
  };

  let wasmReady = false;

  async function initWasm() {
    await init();
    wasmReady = true;
    document.getElementById('runBtn').disabled = false;
  }

  window.runCode = function() {
    if (!wasmReady) return;
    const code = document.getElementById('editor').value;
    const out = document.getElementById('output');
    out.className = '';
    const result = run_han(code);
    if (result.includes('[런타임 에러]') || result.includes('[파서 에러]') || result.includes('[타입 에러]')) {
      out.className = 'error';
    }
    out.textContent = result || '(출력 없음)';
  };

  window.loadExample = function(name) {
    document.getElementById('editor').value = EXAMPLES[name];
  };

  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      window.runCode();
    }
  });

  document.getElementById('runBtn').disabled = true;
  initWasm();
</script>

</body>
</html>
