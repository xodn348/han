<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Han (한) Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }

    header span {
      font-size: 13px;
      color: #8b949e;
    }

    .badge {
      font-size: 11px;
      background: #1f6feb;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #21262d;
    }

    .panel-header {
      padding: 8px 16px;
      font-size: 12px;
      color: #8b949e;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #editor {
      flex: 1;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      min-height: 480px;
    }

    #output {
      flex: 1;
      background: #010409;
      color: #56d364;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 480px;
      overflow-y: auto;
    }

    #output.error { color: #f85149; }
    #output.waiting { color: #8b949e; font-style: italic; }

    .run-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .run-btn:hover { background: #2ea043; }
    .run-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

    .examples {
      padding: 8px 16px;
      background: #161b22;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .example-btn {
      font-size: 12px;
      color: #8b949e;
      background: transparent;
      border: 1px solid #30363d;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .example-btn:hover { color: #c9d1d9; border-color: #6e7681; }
  </style>
</head>
<body>

<header>
  <h1>한 <span style="color:#8b949e">Han</span></h1>
  <span class="badge">v0.1.0</span>
  <span>한국어 프로그래밍 언어 플레이그라운드</span>
  <span style="margin-left:auto; font-size:12px; color:#8b949e">
    <a href="https://github.com/xodn348/han" style="color:#58a6ff">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://xodn348.github.io/han/introduction.html" style="color:#58a6ff">Docs</a>
  </span>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span>코드 편집기</span>
      <button class="run-btn" id="runBtn" onclick="runCode()">▶ 실행</button>
    </div>
    <textarea id="editor" spellcheck="false">출력("뚜두뚜두! 한 (한) 언어에 오신 걸 환영해요 🎵")</textarea>
    <div class="examples">
      <button class="example-btn" onclick="loadExample('hello')">인사</button>
      <button class="example-btn" onclick="loadExample('bts')">BTS 멤버</button>
      <button class="example-btn" onclick="loadExample('fibonacci')">피보나치</button>
      <button class="example-btn" onclick="loadExample('idol')">아이돌 프로필</button>
      <button class="example-btn" onclick="loadExample('lyrics')">가사 분석</button>
    </div>
  </div>

  <div class="panel" style="border-right:none">
    <div class="panel-header">
      <span>출력</span>
    </div>
    <div id="output" class="waiting">▶ 실행 버튼을 눌러주세요</div>
  </div>
</div>

<script type="module">
  import init, { run_han } from './han.js';

  const EXAMPLES = {
    hello: `출력("뚜두뚜두! 한 (한) 언어에 오신 걸 환영해요 🎵")
출력("")
출력("한글로 코딩하는 세상, 지금 시작합니다.")`,

    bts: `변수 멤버들 = ["RM", "진", "슈가", "제이홉", "지민", "뷔", "정국"]

출력("=== BTS 멤버 명단 ===")
반복 변수 i = 0; i < 멤버들.길이(); i += 1 {
    출력(형식("{0}번: {1}", i + 1, 멤버들[i]))
}
출력("")
출력(형식("총 {0}명, 다 같이 방탄!", 멤버들.길이()))`,

    fibonacci: `함수 피보나치(n: 정수) -> 정수 {
    만약 n <= 1 {
        반환 n
    }
    반환 피보나치(n - 1) + 피보나치(n - 2)
}

출력("=== 피보나치 수열 ===")
반복 변수 i = 0; i < 10; i += 1 {
    출력(형식("피보나치({0}) = {1}", i, 피보나치(i)))
}`,

    idol: `구조 아이돌 {
    이름: 문자열,
    그룹: 문자열,
    데뷔: 정수
}

변수 아이유 = 아이돌 { 이름: "아이유", 그룹: "솔로", 데뷔: 2008 }
변수 지수 = 아이돌 { 이름: "지수", 그룹: "BLACKPINK", 데뷔: 2016 }
변수 카리나 = 아이돌 { 이름: "카리나", 그룹: "aespa", 데뷔: 2020 }

변수 아이돌들 = [아이유, 지수, 카리나]

반복 변수 i = 0; i < 아이돌들.길이(); i += 1 {
    변수 활동년수 = 2025 - 아이돌들[i].데뷔
    출력(형식("{0} ({1}) — 데뷔 {2}년, 활동 {3}년차",
        아이돌들[i].이름, 아이돌들[i].그룹,
        아이돌들[i].데뷔, 활동년수))
}`,

    lyrics: `변수 가사 = "나는 나 너는 너로서 살아가는 것 피할 수 없는 숙명"

출력("=== 가사 분석 ===")
출력(형식("원문: {0}", 가사))
출력(형식("글자 수: {0}", 가사.길이()))

변수 단어들 = 가사.분리(" ")
출력(형식("단어 수: {0}", 단어들.길이()))

출력("")
출력("단어 목록:")
반복 변수 i = 0; i < 단어들.길이(); i += 1 {
    출력(형식("  {0}. {1}", i + 1, 단어들[i]))
}`
  };

  let wasmReady = false;

  async function initWasm() {
    await init();
    wasmReady = true;
    document.getElementById('runBtn').disabled = false;
  }

  window.runCode = function() {
    if (!wasmReady) return;
    const code = document.getElementById('editor').value;
    const out = document.getElementById('output');
    out.className = '';
    const result = run_han(code);
    if (result.includes('[런타임 에러]') || result.includes('[파서 에러]') || result.includes('[타입 에러]')) {
      out.className = 'error';
    }
    out.textContent = result || '(출력 없음)';
  };

  window.loadExample = function(name) {
    document.getElementById('editor').value = EXAMPLES[name];
  };

  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      window.runCode();
    }
  });

  document.getElementById('runBtn').disabled = true;
  initWasm();
</script>

</body>
</html>
