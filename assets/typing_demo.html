<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 30px; background: #1e1e2e; display: flex; justify-content: center; }
.window {
  background: #282a36;
  border-radius: 10px;
  width: 650px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  overflow: hidden;
}
.titlebar {
  background: #343746;
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot.r { background: #ff5f57; }
.dot.y { background: #febc2e; }
.dot.g { background: #28c840; }
.title { color: #6272a4; font-size: 12px; margin-left: 8px; font-family: sans-serif; }
.content {
  padding: 16px 20px 20px;
  font-family: 'Menlo', 'SF Mono', 'Apple SD Gothic Neo', monospace;
  font-size: 13.5px;
  line-height: 1.6;
  color: #f8f8f2;
  min-height: 360px;
}
pre { margin: 0; font-family: inherit; white-space: pre-wrap; }
.kw { color: #ff79c6; }
.type { color: #8be9fd; }
.str { color: #f1fa8c; }
.func { color: #50fa7b; }
.num { color: #bd93f9; }
.prompt { color: #50fa7b; font-weight: bold; }
.dim { color: #6272a4; }
.sep { color: #44475a; }
.check { color: #50fa7b; }
.cursor {
  display: inline-block;
  width: 8px;
  height: 15px;
  background: #f8f8f2;
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span class="title">hgl repl</span>
  </div>
  <div class="content">
    <pre id="out"></pre>
  </div>
</div>
<script>
const el = document.getElementById('out');
let html = '';

const banner = `<span class="dim"> ◓◒ ─────────────────────────────────── ◓◒</span>

    ✿  <span class="kw">Han (한)</span> Programming Language
    <span class="dim">v0.1.0 · github.com/xodn348/han</span>

<span class="dim"> ◓◒ ─────────────────────────────────── ◓◒</span>

 종료: Ctrl+D 또는 '나가기' 입력

`;

const lines = [
  { prompt: true, text: '변수 과일 = ["사과", "배", "포도"]', delay: 40 },
  { output: '' },
  { prompt: true, text: '반복 f 안에서 과일 { 출력(f) }', delay: 40 },
  { output: ' 사과\n 배\n 포도' },
  { prompt: true, text: '출력(과일.길이())', delay: 40 },
  { output: ' 3' },
  { prompt: true, text: '변수 점수 = 사전("수학", 95, "영어", 88)', delay: 35 },
  { output: '' },
  { prompt: true, text: '출력(점수["수학"])', delay: 40 },
  { output: ' 95' },
  { prompt: true, text: '출력(현재시간())', delay: 40 },
  { output: ' 2025-03-15 14:30:00' },
];

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(text, delay) {
  for (const ch of text) {
    html += ch;
    el.innerHTML = html + '<span class="cursor"></span>';
    await sleep(delay);
  }
}

async function run() {
  html = banner;
  el.innerHTML = html;
  await sleep(800);

  for (const line of lines) {
    if (line.prompt) {
      html += ' <span class="prompt">한&gt;</span> ';
      el.innerHTML = html + '<span class="cursor"></span>';
      await sleep(400);
      await typeText(line.text, line.delay);
      await sleep(300);
      html += '\n';
    } else if (line.output !== undefined) {
      if (line.output) {
        html += line.output + '\n';
      }
      el.innerHTML = html + '<span class="cursor"></span>';
      await sleep(600);
    }
  }

  html += ' <span class="prompt">한&gt;</span> ';
  el.innerHTML = html + '<span class="cursor"></span>';
}

run();
</script>
</body>
</html>
